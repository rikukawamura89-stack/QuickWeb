<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Web</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%22.9em%22 font-size=%2290%22 fill=%22%2300ff41%22 font-family=%22monospace%22 font-weight=%22bold%22>Q</text></svg>">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #000; --panel-bg: rgba(0, 10, 0, 0.9); --text: #00ff41; }
        .theme-light { --bg: #f5f5f5; --panel-bg: rgba(255, 255, 255, 0.98); --text: #111; --neon: #0066ff; }
        .theme-dark { --bg: #000; --panel-bg: rgba(0, 5, 0, 0.9); --text: #00ff41; --neon: #00ff41; }
        @media (prefers-color-scheme: light) { :root:not(.manual-theme) { --bg: #f5f5f5; --panel-bg: rgba(255, 255, 255, 0.98); --text: #111; --neon: #0066ff; } }

        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; transition: 0.3s; }
        #matrix { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .app-container { position: relative; z-index: 10; display: flex; height: 100vh; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }

        #panel { background: var(--panel-bg); border: 1px solid var(--neon); display: flex; flex-direction: column; backdrop-filter: blur(10px); transition: 0.4s ease; }
        .size-normal { width: 500px; height: 85vh; }
        .size-wide { width: 900px; height: 85vh; }
        .size-full { width: 98vw; height: 95vh; }

        @media (max-width: 768px) { #panel { width: 100% !important; height: 100vh !important; border: none !important; position: fixed; top:0; left:0; } .desktop-only { display: none !important; } }

        .header { padding: 12px 20px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); font-size: 11px; }
        .content { padding: 20px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
        
        .profile-box { display: flex; align-items: center; gap: 12px; padding: 10px; border: 1px solid var(--neon); background: rgba(0,255,0,0.02); }
        .input-group { border: 1px solid rgba(128,128,128,0.2); padding: 15px; background: rgba(0,0,0,0.15); }
        .box-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--neon); color: var(--text); padding: 12px; box-sizing: border-box; outline: none; font-family: inherit; margin-bottom: 8px; font-size: 13px; }
        
        .btn { background: var(--neon); color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; text-transform: uppercase; font-family: inherit; }
        .btn:hover { filter: contrast(1.5); box-shadow: 0 0 10px var(--neon); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; font-size: 10px; border-top: 1px solid rgba(128,128,128,0.2); padding-top: 10px; }
        .stat-item { background: rgba(0,255,0,0.03); padding: 5px 8px; border: 1px solid rgba(128,128,128,0.1); }
        .stat-val { font-weight: bold; color: var(--neon); float: right; }

        #log { flex: 1; background: rgba(0,0,0,0.2); padding: 10px; font-size: 11px; overflow-y: auto; border-left: 2px solid var(--neon); margin-top: 5px; min-height: 80px; }
        
        #settings-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: none; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sect-title { border-bottom: 1px solid var(--neon); padding-bottom: 5px; margin: 15px 0 10px 0; font-size: 11px; color: var(--neon); font-weight: bold; text-transform: uppercase; }
        .readme-box { font-size: 11px; line-height: 1.5; background: rgba(128,128,128,0.1); padding: 15px; border-radius: 4px; color: #888; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="app-container">
    <div id="panel" class="size-normal">
        <div class="header">
            <span style="letter-spacing: 2px;">QUICK WEB // HYBRID</span>
            <div style="display: flex; gap: 12px; align-items: center;">
                <span id="node-stat" style="color: #666; font-size: 9px;">● IDLE</span>
                <span onclick="toggleSet()" style="cursor:pointer; color:orange;">[ CONFIG ]</span>
            </div>
        </div>

        <div class="content">
            <div id="profile-area" style="display:none;">
                <div class="profile-box">
                    <div style="width:35px; height:35px; background:var(--neon); color:#000; display:flex; align-items:center; justify-content:center; font-weight:900;">Q</div>
                    <div style="flex:1">
                        <div id="p-name" style="font-weight:bold; font-size:14px;">---</div>
                        <div id="p-id" style="font-size:9px; opacity:0.6;">---</div>
                    </div>
                    <button class="btn" style="width:auto; padding:4px 10px; font-size:9px;" onclick="logout()">LOGOUT</button>
                </div>

                <div style="margin-top:10px; display:flex; flex-direction:column; gap:10px;">
                    <div class="input-group">
                        <input type="text" id="target-id" class="box-input" placeholder="REMOTE_PEER_ID">
                        <button id="conn-btn" class="btn" onclick="connectNode()">ESTABLISH LINK</button>
                    </div>
                    <div class="input-group">
                        <button class="btn" style="background:#222; color:#fff;" onclick="document.getElementById('f-in').click()">BROWSE FILE</button>
                        <div id="f-name" style="font-size:10px; text-align:center; margin:8px 0; color:orange;">NO_FILE_LOADED</div>
                        <button id="send-btn" class="btn" disabled onclick="execSend()">EXECUTE INJECTION</button>
                        
                        <div class="stats-grid">
                            <div class="stat-item">SPEED: <span class="stat-val" id="st-speed">0 MB/s</span></div>
                            <div class="stat-item">PROGRESS: <span class="stat-val" id="st-prog">0%</span></div>
                            <div class="stat-item">ELAPSED: <span class="stat-val" id="st-time">0s</span></div>
                            <div class="stat-item">CHUNK: <span class="stat-val" id="st-chunk">---</span></div>
                        </div>
                    </div>
                    <div id="log"></div>
                </div>
            </div>

            <div id="login-area" class="input-group">
                <div style="font-size:10px; text-align:center; margin-bottom:15px; opacity:0.6;">INITIALIZATION SEQUENCE</div>
                <input type="text" id="in-name" class="box-input" placeholder="USER_ALIAS">
                <input type="text" id="in-id" class="box-input" placeholder="UNIQUE_PEER_ID">
                <button class="btn" onclick="saveLogin()">SIGN UP</button>
            </div>
        </div>

        <div id="settings-overlay">
            <button class="btn" style="width:auto; padding:5px 20px;" onclick="toggleSet()">SAVE & CLOSE</button>
            
            <div class="sect-title">CORE PREFERENCES</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="lang-select" class="box-input" onchange="changeLang(this.value)">
                    <option value="en">English</option>
                    <option value="id">Bahasa Indonesia</option>
                </select>
                <select id="chunk-select" class="box-input" onchange="saveConfig('ch', this.value)">
                    <option value="10">10MB Chunk</option>
                    <option value="20">20MB Chunk</option>
                    <option value="30">30MB Chunk</option>
                </select>
            </div>

            <div class="sect-title">VISUAL TUNING</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <button class="btn" onclick="setTheme('auto')">AUTO</button>
                <button class="btn" onclick="setTheme('dark')">DARK</button>
                <button class="btn" onclick="setTheme('light')">LIGHT</button>
            </div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:10px;">
                <button class="btn" onclick="setColor('#00ff41')" style="background:#00ff41">NEON</button>
                <button class="btn" onclick="setColor('#ff3131')" style="background:#ff3131">RED</button>
                <button class="btn" onclick="setColor('#00d4ff')" style="background:#00d4ff">BLUE</button>
            </div>

            <div class="sect-title desktop-only">GEOMETRY</div>
            <div class="desktop-only" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <button class="btn" onclick="setSize('size-normal')">NORM</button>
                <button class="btn" onclick="setSize('size-wide')">WIDE</button>
                <button class="btn" onclick="setSize('size-full')">FULL</button>
            </div>

            <div class="sect-title">README / SYSTEM MANUAL</div>
            <div id="readme-box" class="readme-box"></div>

            <div style="margin-top:30px; font-size:9px; text-align:center; opacity:0.4;">
                QUICK WEB v3.5 // BY ZenDev<br>
                &copy; 2026. HYBRID P2P BUILD.
            </div>
            <button class="btn" style="margin-top:15px; background:#400; color:#fff;" onclick="wipe()">WIPE ALL CACHE</button>
        </div>
    </div>
</div>

<input type="file" id="f-in" style="display:none" onchange="filePick()">

<script>
    const storageKey = "qw30_";
    const get = (k) => localStorage.getItem(storageKey + k);
    const set = (k, v) => localStorage.setItem(storageKey + k, v);

    function setTheme(m) {
        document.documentElement.classList.remove('theme-dark', 'theme-light', 'manual-theme');
        if (m !== 'auto') document.documentElement.classList.add('theme-' + m, 'manual-theme');
        set('th', m);
    }
    function setColor(c) { document.documentElement.style.setProperty('--neon', c); set('cl', c); }
    function setSize(s) { if(window.innerWidth > 768) { document.getElementById('panel').className = s; set('sz', s); } }
    function saveConfig(k, v) { set(k, v); if(k==='ch') document.getElementById('st-chunk').innerText = v + "MB"; }
    function toggleSet() { const s = document.getElementById('settings-overlay'); s.style.display = s.style.display === 'block' ? 'none' : 'block'; }

    function changeLang(l) {
        set('lang', l);
        const rm = document.getElementById('readme-box');
        if(l === 'id') {
            rm.innerHTML = "1. P2P Hybrid: Jarak jauh (Internet) & Jarak deket (Wi-Fi) otomatis.<br>2. Anti-NAT: Mendukung koneksi beda ISP lewat STUN.<br>3. Stats: Kecepatan asli real-time.";
        } else {
            rm.innerHTML = "1. P2P Hybrid: Auto distance/internet detection.<br>2. Anti-NAT: Supports cross-ISP via Google STUN.<br>3. Stats: Genuine real-time speed tracking.";
        }
    }

    window.onload = () => {
        const name = get('name'), id = get('id');
        if(name && id) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('profile-area').style.display = 'block';
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-id').innerText = "ID: " + id;
            document.getElementById('st-chunk').innerText = (get('ch') || '10') + "MB";
            document.getElementById('chunk-select').value = get('ch') || '10';
            bootPeer(id);
        }
        setTheme(get('th') || 'auto');
        setColor(get('cl') || '#00ff41');
        setSize(get('sz') || 'size-normal');
        changeLang(get('lang') || 'en');
        document.getElementById('lang-select').value = get('lang') || 'en';
    };

    function saveLogin() {
        const n = document.getElementById('in-name').value.trim();
        const i = document.getElementById('in-id').value.trim();
        if(n && i) { set('name', n); set('id', i); location.reload(); }
    }
    function logout() { localStorage.removeItem(storageKey+'name'); localStorage.removeItem(storageKey+'id'); location.reload(); }
    function wipe() { localStorage.clear(); location.reload(); }

    // --- MATRIX ENGINE ---
    const cvs = document.getElementById('matrix'), x = cvs.getContext('2d');
    let w = cvs.width = window.innerWidth, h = cvs.height = window.innerHeight;
    const d = new Array(Math.floor(w/18)).fill(1);
    function draw() {
        const isLight = document.documentElement.classList.contains('theme-light') || 
                       (!document.documentElement.classList.contains('manual-theme') && window.matchMedia('(prefers-color-scheme: light)').matches);
        x.fillStyle = isLight ? "rgba(245,245,245,0.2)" : "rgba(0,0,0,0.2)";
        x.fillRect(0,0,w,h);
        x.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--neon');
        x.font = "14px monospace";
        d.forEach((y, i) => {
            x.fillText("01"[Math.floor(Math.random()*2)], i*18, y*18);
            if(y*18 > h && Math.random() > 0.98) d[i] = 0;
            d[i]++;
        });
    }
    setInterval(draw, 70);

    // --- PEER CORE (MODIFIKASI SERVER / HYBRID) ---
    let peer = null, conn = null, fl = null;

    function bootPeer(id) {
        // Konfigurasi ICE Servers buat tembus Jarak Jauh (Beda ISP)
        const iceConfig = {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        peer = new Peer(id, { config: iceConfig, debug: 1 });

        peer.on('open', () => { 
            document.getElementById('node-stat').innerText = "● ONLINE";
            document.getElementById('node-stat').style.color = "var(--neon)";
            log("NODE_ONLINE: ID_" + id);
        });

        peer.on('connection', c => setup(c));

        peer.on('error', err => {
            log("ERR: " + err.type);
            if(err.type === 'peer-disconnected') log("PEER_LOST_SIGNAL");
        });
    }

    function connectNode() { 
        const tid = document.getElementById('target-id').value.trim(); 
        if(tid) {
            log("ATTEMPTING_LINK...");
            const newConn = peer.connect(tid, { reliable: true });
            if(newConn) setup(newConn);
        } 
    }
    
    function setup(c) {
        conn = c;
        conn.on('open', () => { 
            log("LINKED_TO_REMOTE"); 
            document.getElementById('conn-btn').innerText = "CONNECTED"; 
            document.getElementById('conn-btn').style.background = "orange";
        });

        conn.on('data', data => {
            if(data.type === 'START') {
                window.rx = { c: [], m: data };
                log("RECEIVING: " + data.name);
            }
            else if(data.type === 'CHUNK') {
                window.rx.c.push(data.chunk);
                if(window.rx.c.length === window.rx.m.total) {
                    const bl = new Blob(window.rx.c);
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(bl); a.download = window.rx.m.name;
                    a.className = "btn"; a.style.marginTop="10px"; a.innerText = "DOWNLOAD: " + window.rx.m.name;
                    document.getElementById('log').prepend(a);
                    log("FILE_RECEIVED_SUCCESS");
                }
            }
        });

        conn.on('close', () => {
            log("LINK_TERMINATED");
            document.getElementById('conn-btn').innerText = "ESTABLISH LINK";
            document.getElementById('conn-btn').style.background = "var(--neon)";
        });
    }

    function log(m) { document.getElementById('log').innerHTML = `<div>> ${m}</div>` + document.getElementById('log').innerHTML; }
    function filePick() { fl = document.getElementById('f-in').files[0]; if(fl) { document.getElementById('f-name').innerText = fl.name; document.getElementById('send-btn').disabled = false; } }

    async function execSend() {
        if(!conn || !conn.open) { log("ERR: NO_ACTIVE_LINK"); return; }
        const CH_SIZE = (parseInt(get('ch')) || 10) * 1024 * 1024;
        const tt = Math.ceil(fl.size / CH_SIZE);
        const startTime = Date.now();
        
        log("INJECTING_DATA...");
        conn.send({ type: 'START', name: fl.name, total: tt });

        for(let i=0; i<tt; i++) {
            if(!conn.open) break;
            const chunk = await fl.slice(i*CH_SIZE, (i+1)*CH_SIZE).arrayBuffer();
            conn.send({ type: 'CHUNK', chunk: chunk });
            
            const elapsed = (Date.now() - startTime) / 1000;
            const speed = ((i + 1) * CH_SIZE / (1024 * 1024)) / (elapsed || 1);
            
            document.getElementById('st-prog').innerText = Math.floor(((i+1)/tt)*100) + "%";
            document.getElementById('st-speed').innerText = speed.toFixed(1) + " MB/s";
            document.getElementById('st-time').innerText = elapsed.toFixed(0) + "s";
            
            if(i % 5 === 0) log(`BLOCK_${i+1}/${tt}_SENT`);
        }
        log("INJECTION_COMPLETE");
    }
</script>
</body>
</html>
